name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt

      - name: pip-audit
        run: pip-audit -r requirements.txt

      - name: Bandit
        run: |
          pip install bandit
          bandit -r app.py core config middleware routes services utils -ll -q -b .bandit_baseline.json

  docker:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        id: docker_build
        run: docker build -t moegate:ci .

      - name: Smoke test healthz
        run: |
          docker run -d --name moegate-ci \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e API_KEY=test-secret-api-key-for-ci-minimum-32-chars \
            -e API_SESSION_SECRET=test-session-secret-distinct-from-api-key \
            -e ALLOWED_BASE_DIR=/data/containers \
            -e SHUTDOWN_DESTROY_CONTAINERS=false \
            -p 18080:8080 \
            moegate:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz; then
              exit 0
            fi
            sleep 2
          done
          docker logs moegate-ci
          exit 1

      - name: Trivy image scan
        if: steps.docker_build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: moegate:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Stop smoke container
        if: always()
        run: docker rm -f moegate-ci || true
