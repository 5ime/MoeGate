services:
  moegate:
    extends:
      file: ../../docker-compose.yml
      service: moegate
    environment:
      FRP_ADMIN_IP: frpc
      FRP_LOCAL_IP: host.docker.internal

  frpc:
    image: snowdreamtech/frpc:0.58.0
    container_name: moegate-frpc
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../frpc.toml:/etc/frp/frpc.toml
    depends_on:
      moegate:
        condition: service_healthy

volumes:
  moegate-data:
